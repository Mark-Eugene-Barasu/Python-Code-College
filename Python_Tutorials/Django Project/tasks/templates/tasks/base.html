<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}To-Do Tasks{% endblock %}</title>
    <style>
      :root {
        --bg: #f6fbff;
        --card: #ffffff;
        --text: #14324a;
        --muted: #5f7a94;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --danger: #b91c1c;
        --success: #15803d;
        --border: #d7e3f3;
        --shadow: 0 10px 25px rgba(20, 50, 74, 0.08);
      }

      body.dark-mode {
        --bg: #0b1220;
        --card: #0f1b33;
        --text: #e7f0ff;
        --muted: #a9bddf;
        --danger: #f87171;
        --success: #34d399;
        --border: #213257;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      /* Theme override variables */
      body.theme-ocean { --primary: #2563eb; --primary-dark: #1d4ed8; }
      body.theme-grape { --primary: #7c3aed; --primary-dark: #6d28d9; }
      body.theme-sun { --primary: #f59e0b; --primary-dark: #d97706; }
      body.theme-forest { --primary: #16a34a; --primary-dark: #15803d; }
      body.theme-rose { --primary: #e11d48; --primary-dark: #be123c; }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(1000px 500px at 10% 0%, #e0f2fe, transparent 60%), var(--bg);
        color: var(--text);
        overflow-x: hidden;
      }

      @keyframes floatIn {
        from { opacity: 0; transform: translateY(12px); filter: blur(3px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      .anim-in { animation: floatIn 520ms ease-out both; }

      header {
        padding: 1.25rem 1rem;
        border-bottom: 1px solid var(--border);
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(6px);
      }
      body.dark-mode header { background: rgba(9, 17, 35, 0.55); }

      .container { max-width: 880px; margin: 0 auto; padding: 1rem; }
      .brand { display: flex; gap: 0.75rem; align-items: center; }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), #60a5fa);
        display: grid;
        place-items: center;
        color: white;
        font-weight: 800;
        box-shadow: var(--shadow);
      }

      h1 { margin: 0 0 0.5rem 0; font-size: 1.8rem; }
      p { line-height: 1.45; }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: -40% -40% auto -40%;
        height: 120px;
        transform: rotate(10deg);
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
        opacity: 0;
        transition: opacity 200ms ease;
        pointer-events: none;
      }
      .card:hover::after { opacity: 1; animation: shimmer 900ms ease-out both; }
      @keyframes shimmer {
        from { transform: translateX(-30%) rotate(10deg); }
        to { transform: translateX(30%) rotate(10deg); }
      }

      .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

      .btn {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.55rem 0.9rem;
        background: white;
        color: var(--text);
        text-decoration: none;
        font-weight: 650;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      }
      .btn:hover { border-color: #bcd6f5; transform: translateY(-1px); }
      body.dark-mode .btn { background: rgba(255,255,255,0.03); color: var(--text); }

      .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
      .btn-primary:hover { background: var(--primary-dark); }

      .btn-danger { background: #fff; color: var(--danger); border-color: #f2b5b5; }
      body.dark-mode .btn-danger { background: rgba(255,255,255,0.03); }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.25rem 0.55rem;
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.9rem;
        border: 1px solid var(--border);
      }
      .badge-success { color: var(--success); background: #eafff0; border-color: #b9f6c2; }
      .badge-warning { color: #b45309; background: #fff7ed; border-color: #fed7aa; }
      body.dark-mode .badge-warning { border-color: rgba(254, 215, 170, 0.35); }

      label { display:block; font-weight: 700; margin-bottom: 0.25rem; }
      input[type="text"] {
        width: min(420px, 100%);
        padding: 0.6rem;
        border-radius: 10px;
        border: 1px solid var(--border);
      }
      body.dark-mode input[type="text"] { background: rgba(255,255,255,0.03); color: var(--text); }

      .field { margin: 0.75rem 0; }
      .tiny { color: var(--muted); font-size: 0.95rem; }

      footer { padding: 1.5rem 1rem 2rem; color: var(--muted); text-align: center; }

      @media (max-width: 600px) {
        header { padding: 1.05rem 0.75rem; }
        .container { padding: 0.75rem; }
        h1 { font-size: 1.35rem; }
        input[type="text"] { width: 100%; }
        .actions { justify-content: center; }
      }

      @media (min-width: 1600px) {
        .container { max-width: 1100px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .anim-in { animation: none !important; }
        .card:hover::after { animation: none !important; }
      }

      /* Theme controls (inside header) */
      .theme-controls {
        position: static;
        user-select: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-end;
      }


      .panel {
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.75);
        backdrop-filter: blur(6px);
        box-shadow: var(--shadow);
        border-radius: 16px;
        padding: 10px;
        width: 240px;
        overflow: hidden;
      }
      body.dark-mode .panel { background: rgba(10, 18, 37, 0.65); }

      /* Foldable panel to avoid overlap on small screens */
      .theme-toggle-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .panel[hidden] { display: none !important; }

      /* Always keep the panel compact on small screens (prevents overlap) */
      @media (max-width: 600px) {
        .theme-controls {
          top: 8px;
          right: 8px;
          align-items: flex-end;
          max-width: 92vw;
        }
        .panel {
          width: 210px;
          padding: 8px;
          border-radius: 14px;
        }
        .panel-title {
          font-size: 0.95rem;
          margin-bottom: 6px;
        }
        .toggle-pill {
          padding: 0.45rem 0.6rem;
        }
        .select {
          padding: 7px 9px;
        }
      }



      .panel-title {
        font-weight: 900;
        letter-spacing: 0.2px;
        margin: 0 0 8px 0;
        color: var(--text);
      }

      .row { display: flex; gap: 10px; align-items: center; justify-content: space-between; }

      .toggle-pill {
        cursor: pointer;
        border-radius: 999px;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.75);
        color: var(--text);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 900;
      }
      body.dark-mode .toggle-pill { background: rgba(255,255,255,0.03); }

.select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.8);
        color: var(--text);
        font-weight: 800;
      }

      /* Ensure dropdown text is readable in dark mode */
      body.dark-mode .select {
        background: rgba(255,255,255,0.05);
        color: #e7f0ff;
      }

      body.dark-mode .select option {
        color: #0b1220;
      }

    </style>
  </head>

  <body>
    <header>
      <div class="container brand" style="justify-content: space-between; align-items: center;">
        <div class="brand" style="gap: 0.75rem; align-items: center;">
          <div class="logo">✓</div>
          <div>
            <h1 style="margin:0" class="anim-in">To-Do Tasks</h1>
            <div class="tiny anim-in" style="animation-delay: 70ms;">Make small wins every day!</div>
          </div>
        </div>

        <div class="theme-controls" aria-label="Theme controls">
          <div class="panel" style="min-width: 240px;">
            <button type="button" class="toggle-pill" id="themeToggleBtn" aria-label="Toggle dark mode">
              <span id="themeToggleIcon">🌙</span>
              <span id="themeToggleLabel">Dark</span>
              <span style="margin-left: 6px; font-weight: 900;">▾</span>
            </button>

            <div id="accentSection" style="margin-top: 10px;">
              <div class="panel-title" style="margin-bottom: 8px;">Accent</div>
              <select id="themeSelect" class="select" aria-label="Choose accent theme">
                <option value="ocean">Ocean</option>
                <option value="grape">Grape</option>
                <option value="sun">Sun</option>
                <option value="forest">Forest</option>
                <option value="rose">Rose</option>
              </select>
            </div>
          </div>
        </div>

      </div>
    </header>


    <div class="container">
      <div class="anim-in" style="animation-delay: 110ms;">
        {% block content %}{% endblock %}
      </div>
    </div>

    <footer>
      Built with Django · CRUD demo
    </footer>

    <script>
      (function () {
        const body = document.body;
        const btn = document.getElementById('themeToggleBtn');
        const icon = document.getElementById('themeToggleIcon');
        const label = document.getElementById('themeToggleLabel');
        const select = document.getElementById('themeSelect');

        const ACCENTS = ['ocean', 'grape', 'sun', 'forest', 'rose'];

        function applyAccent(accent) {
          ACCENTS.forEach(a => body.classList.remove('theme-' + a));
          body.classList.add('theme-' + accent);
          localStorage.setItem('accent', accent);
        }

        function applyTheme(isDark) {
          body.classList.toggle('dark-mode', !!isDark);
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          icon.textContent = isDark ? '☀️' : '🌙';
          label.textContent = isDark ? 'Light' : 'Dark';
        }

        // init
        applyTheme(localStorage.getItem('theme') === 'dark');

        const savedAccent = localStorage.getItem('accent') || 'ocean';
        select.value = savedAccent;
        applyAccent(savedAccent);

        const accentSection = document.getElementById('accentSection');
        let accentOpen = false;
        accentSection.style.display = 'none';

        btn.addEventListener('click', function () {
          const isDark = body.classList.contains('dark-mode');
          applyTheme(!isDark);

          // open/close accent dropdown after clicking theme
          accentOpen = !accentOpen;
          accentSection.style.display = accentOpen ? 'block' : 'none';
        });

        // start with persisted accent visibility preference (optional)
        // (kept simple: default closed)


        select.addEventListener('change', function () {
          applyAccent(select.value);
        });
      })();
    </script>
  </body>
</html>
