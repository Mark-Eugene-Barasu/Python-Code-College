<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ task.title }}</title>
    <style>
      body { font-family: sans-serif; margin: 2rem; }
      .btn { padding: 0.4rem 0.8rem; border: 1px solid #333; border-radius: 6px; background: #fff; text-decoration:none; display:inline-block; margin-right:0.5rem; }
    </style>
  </head>
  <body>
    <h1>{{ task.title }}</h1>

    <p>
      Status:
      {% if task.completed %}
        <strong style="color:#0a7a0a;">Completed</strong>
      {% else %}
        <strong style="color:#a06a00;">Open</strong>
      {% endif %}
    </p>

    <p>Created: {{ task.created_at|date:"Y-m-d H:i" }}</p>
    <p>Updated: {{ task.updated_at|date:"Y-m-d H:i" }}</p>

    <p>
      <a class="btn" href="{% url 'tasks:task_update' task.pk %}">Edit</a>
      <a class="btn" href="{% url 'tasks:task_delete' task.pk %}">Delete</a>
      <a class="btn" href="{% url 'tasks:task_list' %}">Back to list</a>
    </p>
  </body>
</html>
