<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Delete {{ task.title }}</title>
    <style>
      body { font-family: sans-serif; margin: 2rem; }
      .btn { padding: 0.4rem 0.8rem; border: 1px solid #333; border-radius: 6px; background: #fff; text-decoration:none; display:inline-block; }
      .danger { border-color:#b00; color:#b00; }
    </style>
  </head>
  <body>
    <h1>Delete task</h1>
    <p>Are you sure you want to delete <strong>{{ task.title }}</strong>?</p>

    <form method="post">
      {% csrf_token %}
      <button class="btn danger" type="submit">Yes, delete</button>
      <a class="btn" href="{% url 'tasks:task_detail' task.pk %}">Cancel</a>
    </form>
  </body>
</html>
